name: Build & Push ATS Image

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout document-analyzer
        uses: actions/checkout@v4

      # GlobalExceptionHandler 등 global 패키지 — document-analyzer build.gradle 이 참조
      - name: Checkout management-back (shared global)
        uses: actions/checkout@v4
        with:
          repository: Miniproject-management/management-back
          path: management-back
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: AWS Login
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2
 
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image (document-analyzer)
        run: |
          docker build -f Dockerfile -t document-analyzer:latest .

      - name: Tag image
        run: |
          docker tag document-analyzer:latest \
          804540872991.dkr.ecr.ap-northeast-2.amazonaws.com/miniproject-management/document-analyzer:latest

      - name: Push image
        run: |
          docker push 804540872991.dkr.ecr.ap-northeast-2.amazonaws.com/miniproject-management/document-analyzer:latest
