# management-back 의 application.yml 과 동일 키·주석 구조 (spring.application.name 만 이 서비스용).
# Postman: 예전과 동일하게 백엔드(Ingress) URL + /api/public/... , /api/hr/applicants/... 사용
# (management-back 의 document-analyzer 프록시가 이 인스턴스로 전달).

server:
  port: 8080

spring:
  application:
    name: document-analyzer

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    open-in-view: false

  ai:
    google:
      genai:
        api-key: ${GOOGLE_API_KEY:}

# Gemini 이력서 분석 (Google AI Studio API 키 → spring.ai.google.genai.api-key 와 동일 변수 사용)
# gemini-1.5-flash 는 일부 키/지역에서 404(NOT_FOUND) — 필요 시 GEMINI_MODEL 로 재정의
app:
  gemini:
    model: ${GEMINI_MODEL:gemini-2.5-flash}

  # 브라우저가 document-analyzer 에 직접 붙을 때만 사용 (대부분은 백엔드 프록시 경유)
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://k8s-miniproj-appingre-81c01d55c9-1855530779.ap-northeast-2.elb.amazonaws.com}

# 백엔드 JwtProvider 와 동일 시크릿이면 Bearer 검증 가능(직접 호출 시). 프록시만 쓰면 생략 가능.
jwt:
  secret: ${JWT_SECRET:mysecretkeymysecretkeymysecretkey123456}

cloud:
  aws:
    region: ap-northeast-2 #수정 필요
    s3:
      bucket: miniproject-management-dev-files-804540872991
