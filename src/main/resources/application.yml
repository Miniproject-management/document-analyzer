server:
  port: 8080

spring:
  application:
    name: document-analyzer

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    open-in-view: false

  ai:
    google:
      genai:
        api-key: ${GOOGLE_API_KEY:}

app:
  gemini:
    model: ${GEMINI_MODEL:gemini-2.5-flash}

cloud:
  aws:
    region: ap-northeast-2
    s3:
      bucket: miniproject-management-dev-files-804540872991
